<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="stylesheet.css">
    <script src="scripts/background.js"></script>
    <style>
        .form-group {
            width: 100%;
            align-items: flex-start;
            text-align: left;
        }

        .message-warning {
            display: none;
        }
    </style>
</head>

<body class="iframe-body">
    <div class="content">
        <div class="panel">
            <div class="panel-title">Settings</div>

            <div class="panel-content">
                <div class="form-group" id="cloakingTab">
                    <label class="form-label">Tab Cloaking</label>
                    <button onclick="openAboutBlank()">
                        <i class="fa-solid fa-mask"></i> Cloak Site
                    </button>
                </div>

                <div class="form-group">
                    <label class="form-label">Tab Disguise</label>
                    <div class="friend-actions">
                        <button
                            onclick="setDisguise('Clever', 'https://cdn.jsdelivr.net/gh/nexora240-lgtm/Nexora-Assets/favicon/clever.ico')"
                            class="friend-btn">Clever</button>
                        <button
                            onclick="setDisguise('Home - Classroom', 'https://ssl.gstatic.com/classroom/favicon.png')"
                            class="friend-btn">Classroom</button>
                        <button
                            onclick="setDisguise('Home - Google Drive', 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png')"
                            class="friend-btn">Drive</button>
                        <button onclick="setDisguise('Edpuzzle', 'https://edpuzzle.imgix.net/favicons/favicon-32.png')"
                            class="friend-btn">Edpuzzle</button>
                        <button onclick="setDisguise('Enter Game PIN - Kahoot!', 'https://kahoot.it/favicon.ico')"
                            class="friend-btn">Kahoot</button>
                        <button
                            onclick="setDisguise('Quizlet: Study Tools & Learning Resources for Students and Teachers | Quizlet', './assets/quizletIco.svg')"
                            class="friend-btn">Quizlet</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Background Design</label>
                    <div class="friend-actions">
                        <button onclick="changeWallpaper('none')" class="friend-btn">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        <button onclick="changeWallpaper('matrix')" class="friend-btn">Matrix</button>
                        <button onclick="changeWallpaper('constellation')" class="friend-btn">Constellation</button>
                        <button onclick="changeWallpaper('bokeh')" class="friend-btn">Bokeh</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Panic Key</label>
                    <div class="text-container">
                        <div class="text-wrapper">
                            <input type="text" id="panic-key" class="text-bar" placeholder="Click to set key..."
                                readonly>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Panic Location</label>
                    <div class="text-container">
                        <div class="text-wrapper">
                            <input type="text" id="panic-url" class="text-bar" placeholder="https://google.com">
                        </div>
                    </div>
                </div>

                <button onclick="saveSettings()">Save</button>
                <div id="message-warning" style="display: none;">This iframe cannot update your tab live, refresh to retrieve tab updates.
                </div>
            </div>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <script>
        document.getElementById('panic-key').value = localStorage.getItem('panicKey') || 'Not Set';
        document.getElementById('panic-url').value = localStorage.getItem('panicUri') || 'https://google.com';

        document.getElementById('panic-key').addEventListener('click', function () {
            this.value = "Listening...";
            const keyHandler = (e) => {
                e.preventDefault();
                this.value = e.key;
                window.removeEventListener('keydown', keyHandler);
            };
            window.addEventListener('keydown', keyHandler);
        });

        function saveSettings() {
            let currentUrl = document.getElementById('panic-url').value;
            let savedUrl = currentUrl;
            if (!currentUrl.includes(".com")) {
                savedUrl = currentUrl + ".com";
            }

            localStorage.setItem('panicKey', document.getElementById('panic-key').value);
            localStorage.setItem('panicUri', savedUrl);
            alert("Settings updated!");
            location.reload();
        }

        function setDisguise(name, icon) {
            try {
                top.document.title = name;
                let link = top.document.querySelector("link[rel~='icon']") || top.document.createElement('link');
                link.rel = 'icon';
                link.href = icon;
                top.document.head.appendChild(link);
                localStorage.setItem('pref_disguise', JSON.stringify({ name, icon }));
            } catch (e) {
                const warning = document.getElementById('messageWarning');

                document.title = name;
                let link = document.querySelector("link[rel~='icon']") || document.createElement('link');
                link.rel = 'icon';
                link.href = icon;
                document.head.appendChild(link);
                localStorage.setItem('pref_disguise', JSON.stringify({ name, icon }));
                warning.style.display = 'flex';
            }
        }

        function resetDisguise() {
            localStorage.removeItem('pref_disguise');
            window.parent.location.reload();
        }

        function changeWallpaper(mode) {
            localStorage.setItem('bg', mode);

            if (typeof window.applyBackgroundDesign === 'function') {
                window.applyBackgroundDesign(mode);
            }

            if (window.parent && typeof window.parent.applyBackgroundDesign === 'function') {
                window.parent.applyBackgroundDesign(mode);
            }
        }

        function openAboutBlank() {
            const newTab = window.open('about:blank', '_blank');
            if (!newTab) {
                alert("Popup blocked! Please allow popups for this site.");
                return;
            }

            fetch('index.html').then(async (res) => {
                let html = await res.text();
                if (!/<base\s/i.test(html)) {
                    html = html.replace(/<head.*?>/, match => `${match}\n<base href="${location.origin}/">`);
                }

                newTab.document.open();
                newTab.document.write(html);
                newTab.document.close();

                const aboutBlankBtn = document.getElementById('aboutBlankBtn');
                if (aboutBlankBtn) {
                    aboutBlankBtn.style.display = 'none';
                }

                window.top.location = 'https://www.google.com';
            });
        }
    </script>
</body>

</html>
