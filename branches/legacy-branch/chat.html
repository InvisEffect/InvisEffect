<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT Central | Chat</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/index.js"></script>
</head>

<body>
    <nav class="navbar">
        <button onclick="location.href='index.html'">
            <span class="icon">🏠</span>
            <span class="label">home</span>
        </button>

        <button onclick="location.href='games.html'">
            <span class="icon">🎮</span>
            <span class="label">games</span>
        </button>

        <button onclick="location.href='chat.html'">
            <span class="icon">💬</span>
            <span class="label">chat</span>
        </button>

        <button onclick="location.href='proxy.html'">
            <span class="icon">🛜</span>
            <span class="label">proxy</span>
        </button>

        <button onclick="location.href='https://google.com'">
            <span class="icon">❗</span>
            <span class="label">panic</span>
        </button>
        <hr style="width: 80%; opacity: 0; margin: 10px auto;">

        <button id="adminSidebarBtn" onclick="openAdminPanel()">
            <span class="icon">🛡️</span>
            <span class="label">admin</span>
        </button>

        <button onclick="logout()">
            <span class="icon">🚪</span>
            <span class="label">logout</span>
        </button>
    </nav>
    
    <canvas id="bg-canvas"></canvas>

    <div id="content">
        <div id="auth-container" class="glowing" style="padding:20px">
            <h2 id="auth-title" style="margin-top: 0;">login to chat</h2>
            <div class="form-group" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="field-sid" placeholder="student id...">
                <input type="password" id="field-pass" placeholder="password...">
                <div id="signup-only" style="display:none; flex-direction:column; gap:10px;">
                    <input type="text" id="field-name" placeholder="real name...">
                    <input type="text" id="field-user" placeholder="desired username...">
                </div>
                <button id="loginBtn" class="glowing" onclick="handleLogin()">login</button>
                <button id="signupBtn" class="glowing" onclick="handleSignup()" style="display:none;">sign up</button>
                <a href="#" id="toggle-link" onclick="toggleAuthMode()"
                    style="color:#bb86fc; font-size:12px; text-decoration: none; text-align: center;">sign up</a>
                <p id="status-msg" style="margin: 5px 0;"></p>
            </div>
        </div>
    </div>

    <div id="content" style="width: 50%">
        <div id="messages">
            <div id="pinned-container">
                <div id="pinned-messages">
                    <p>pinned messages</p>
                </div>
            </div>

            <div id="regular-messages"></div>
        </div>

        <div class="input-container">
            <input type="text" id="messageInput" placeholder="...">
            <button id="sendBtn" class="glowing">send</button>
        </div>
    </div>

    <script src="scripts/chat.js"></script>
</body>

</html>
